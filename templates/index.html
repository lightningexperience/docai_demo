<!DOCTYPE html>
<html>
<head>
    <title>Document AI Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; max-width: 600px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 5px; margin-top: 20px;}
        .error { color: red; font-weight: bold; }
        .result { font-size: 1.2em; color: #2c3e50; }
        .experience-box { margin-top: 15px; font-size: 0.9em; line-height: 1.4; color: #333; }
        .debug-data { font-size: 0.85em; color: #7f8c8d; background-color: #f9f9f9; padding: 10px; border-radius: 4px; margin-top: 15px; word-wrap: break-word;}
    </style>
</head>
<body>
    <h2>Upload Document for AI Extraction</h2>
    
    <div class="box">
        <form method="POST" enctype="multipart/form-data">
            <label for="document">Select a Document (PDF, JPG, PNG):</label><br><br>
            <input type="file" name="document" id="document" accept="application/pdf, image/jpeg, image/png" required><br><br>
            <button type="submit">Upload and Extract</button>
        </form>
    </div>

    {% if error %}
        <div class="box error">
            <p>Error: {{ error }}</p>
        </div>
    {% endif %}

    {% if data %}
        <div class="box result">
            <h3>Extraction Results:</h3>
            <p><strong>First Name:</strong> {{ data.first_name }}</p>
            <p><strong>Last Name:</strong> {{ data.last_name }}</p>
            
            <div class="experience-box">
                <strong>Professional Experience:</strong><br>
                {{ data.experience }}
            </div>
            
            <div class="debug-data">
                <p><strong>Raw AI Output (Debug):</strong></p>
                <p>{{ data.raw_data }}</p>
            </div>
        </div>
    {% endif %}
</body>
</html>
